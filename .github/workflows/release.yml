name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify release files
        run: |
          test -s main.js
          test -s manifest.json
          test -f styles.css
          test -s assets/fonts/pretendard/LICENSE

      - name: Verify tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match manifest.json version ($MANIFEST_VERSION)."
            exit 1
          fi

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp assets/fonts/pretendard/LICENSE Pretendard-OFL-1.1-LICENSE.txt
          gh release create "$GITHUB_REF_NAME" \
            main.js manifest.json styles.css Pretendard-OFL-1.1-LICENSE.txt \
            --title "$GITHUB_REF_NAME" \
            --notes "BRAT-compatible release for Mosaic Eng Lecture."
